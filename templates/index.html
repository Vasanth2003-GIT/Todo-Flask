<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flask To-Do List</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <div class="container">

        <h2>My To-Do List</h2>

        <div class="input-box">
            <input
                type="text"
                id="taskInput"
                placeholder="Enter your task">

            <button id="addBtn">
                Add Task
            </button>
        </div>

        <ul id="taskList"></ul>

    </div>

    <script src="{{ url_for('static', filename='work.js') }}"></script>

</body>
</html>
